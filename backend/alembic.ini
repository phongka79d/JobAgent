# Alembic configuration for JobAgent application SQLite schema.
# Runtime URL comes from env.py (settings SQLITE_PATH or sqlalchemy.url override).
# Schema ownership: application tables only; never LangGraph checkpoint tables.

[alembic]
script_location = migrations
prepend_sys_path = .
path_separator = os
version_path_separator = os

# Placeholder only; env.py builds sqlite+aiosqlite URL from settings or override.
sqlalchemy.url = driver://user:pass@localhost/dbname

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
