[project]
name = "jobagent-phase-0-backend"
version = "0.0.0"
description = "Phase 0 compatibility scaffold; no production service is implemented."
requires-python = ">=3.13"
dependencies = [
    # Phase 0 gate-proven pins (exact versions exercised by diagnostics/benchmarks).
    "langchain-openai==1.0.3",
    "pydantic==2.12.5",
    "pypdf==6.12.2",
    "python-dotenv==1.2.2",
]

[project.optional-dependencies]
# Focused fake-provider and synthetic-fixture tests only (no network).
test = ["pytest==8.4.2"]
# Plan 2 production-stack decisions (not installed for Phase 0 gates).
# FastAPI floor is master-plan SSE requirement: >=0.135.0.
plan2 = [
    "fastapi==0.139.0",
    "langgraph==1.2.9",
    "neo4j==6.2.0",
]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.setuptools]
packages = []
