[project]
name = "jobagent-backend"
version = "0.1.0"
description = "JobAgent backend foundation: FastAPI app, typed root settings, and Phase 0 diagnostics."
requires-python = ">=3.13"
dependencies = [
    # Phase 0 gate-proven pins (exact versions; do not change without approval).
    "langchain-openai==1.0.3",
    "pydantic==2.12.5",
    "pypdf==6.12.2",
    "python-dotenv==1.2.2",
    # Plan 2 foundation runtime (01A).
    "fastapi==0.139.0",
    "pydantic-settings==2.14.2",
    "sqlalchemy==2.0.51",
    "aiosqlite==0.22.1",
    "alembic==1.18.5",
    "uvicorn==0.51.0",
    # Plan 2 graph client (04A); locked Phase 0 / Plan 1 driver pin.
    "neo4j==6.2.0",
    # Plan 3 Agent runtime (02C): locked LangGraph + compatible SQLite checkpointer.
    "langgraph==1.2.9",
    "langgraph-checkpoint-sqlite==3.1.0",
]

[project.optional-dependencies]
# Focused tests + local quality toolchain (no network required for normal suite).
test = [
    "pytest==8.4.2",
    "ruff==0.15.21",
    "mypy==1.18.2",
]

[project.scripts]
# Production-shaped local server (localhost-only bind).
jobagent-api = "app.main:run"

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "neo4j: optional live Neo4j container checks (requires NEO4J_PASSWORD)",
]

[tool.setuptools.packages.find]
include = ["app*"]

[tool.ruff]
target-version = "py313"
src = ["app", "tests"]
line-length = 88

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
# Phase 0 diagnostic tests predate the ruff line budget; keep foundation lint
# focused on correctness without mass-reformatting historical fixtures.
ignore = ["E501"]

[tool.mypy]
python_version = "3.13"
packages = ["app"]
strict = true
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true

# Local quality commands (from backend/):
#   python -m pip install -e ".[test]"
#   python -m pytest -q
#   python -m ruff check app tests
#   python -m mypy app
# Production server:
#   python -m uvicorn app.main:app --host 127.0.0.1 --port 8000
#   jobagent-api
