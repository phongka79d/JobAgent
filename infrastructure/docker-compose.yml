# JobAgent local Compose — exactly three services: frontend, backend, neo4j.
# Run from repository root with the single root env contract, e.g.:
#   docker compose --env-file .env -f infrastructure/docker-compose.yml up --build -d
# Static validation (no secrets):
#   docker compose --env-file .env.example -f infrastructure/docker-compose.yml config
#   docker compose --env-file .env.example -f infrastructure/docker-compose.yml build
#
# Host publications bind to 127.0.0.1 only. Neo4j stays on the internal network.
# Named volumes persist SQLite/files and Neo4j data across restart and plain down.

name: jobagent

services:
  neo4j:
    image: neo4j:5.26-community
    restart: unless-stopped
    environment:
      # Community image; native vector indexes (no plugin) for Plan 2 schema.
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
    volumes:
      - jobagent_neo4j_data:/data
    networks:
      - jobagent_net
    # No host port publication by default (master §22.1).
    expose:
      - "7474"
      - "7687"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s

  backend:
    build:
      context: ..
      dockerfile: infrastructure/docker/backend.Dockerfile
    restart: unless-stopped
    depends_on:
      neo4j:
        condition: service_started
    environment:
      # Root configuration contract (master §23 / Plan 2 §7.1). Injected at
      # runtime from Compose --env-file; never baked into the image.
      APP_ENV: ${APP_ENV}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN}
      VITE_API_BASE_URL: ${VITE_API_BASE_URL}
      SQLITE_PATH: ${SQLITE_PATH}
      FILES_DIR: ${FILES_DIR}
      NEO4J_URI: ${NEO4J_URI}
      NEO4J_USER: ${NEO4J_USER}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      SHOPAIKEY_BASE_URL: ${SHOPAIKEY_BASE_URL}
      SHOPAIKEY_API_KEY: ${SHOPAIKEY_API_KEY}
      LLM_MODEL: ${LLM_MODEL}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS}
      MAX_PDF_SIZE_MB: ${MAX_PDF_SIZE_MB}
      MAX_PDF_PAGES: ${MAX_PDF_PAGES}
      URL_FETCH_TIMEOUT_SECONDS: ${URL_FETCH_TIMEOUT_SECONDS}
      URL_MAX_RESPONSE_MB: ${URL_MAX_RESPONSE_MB}
      TOOL_LOOP_LIMIT: ${TOOL_LOOP_LIMIT}
    volumes:
      # SQLite file + FILES_DIR under /data survive restart and plain `down`.
      - jobagent_backend_data:/data
    ports:
      - "127.0.0.1:8000:8000"
    networks:
      - jobagent_net
    healthcheck:
      # TCP readiness only; sanitized GET /api/health is task 05B.
      test:
        [
          "CMD",
          "python",
          "-c",
          "import socket; s=socket.create_connection(('127.0.0.1',8000),2); s.close()",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  frontend:
    build:
      context: ..
      dockerfile: infrastructure/docker/frontend.Dockerfile
      args:
        # Public build-time value only (exact approved VITE_ key).
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    ports:
      - "127.0.0.1:5173:8080"
    networks:
      - jobagent_net
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-q",
          "--spider",
          "http://127.0.0.1:8080/",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

networks:
  jobagent_net:
    driver: bridge

volumes:
  jobagent_backend_data:
    name: jobagent_backend_data
  jobagent_neo4j_data:
    name: jobagent_neo4j_data
